name: Tuya PSK Bridge
version: "0.1.0"
slug: tuya_psk_bridge
description: >-
  Local bridge that accepts Tuya/Smart Life TLS-PSK device traffic and exposes
  decoded state to Home Assistant through MQTT discovery.
url: "https://github.com/PetePeter/tuya-psk-bridge"
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
init: false
boot: auto
startup: services
ports:
  8886/tcp: 8886
ports_description:
  8886/tcp: Tuya TLS-PSK listener
options:
  listen_host: "0.0.0.0"
  mqtt_psk_port: 8886
  ha_mqtt_host: "core-mosquitto"
  ha_mqtt_port: 1883
  ha_mqtt_username: ""
  ha_mqtt_password: ""
  log_level: "INFO"
  devices: []
schema:
  listen_host: str
  mqtt_psk_port: port
  ha_mqtt_host: str
  ha_mqtt_port: port
  ha_mqtt_username: str?
  ha_mqtt_password: password?
  log_level: list(INFO|DEBUG|WARNING|ERROR)
  devices:
    - device_id: str
      local_key: password
      name: str
      profile: str
      mappings:
        - dps: str
          platform: str
          device_class: str?
          values: dict?
